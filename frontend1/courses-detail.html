<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Learn coding with AI assistance on CodePath.">
  <title>Lesson - CodePath</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo">
        <a href="index.html">
          <img src="logo.jpg" alt="">

        </a>
      </div>

      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="courses.html" class="nav-link">Courses</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="profile.html" class="nav-link">Profile</a>
      </div>

      <div class="nav-right">
        <div class="nav-auth">
          <a href="login.html" class="login-btn">Login</a>
          <a href="signup.html" class="signup-btn">Sign Up</a>
        </div>

        <div class="profile-section">
          <div class="profile-avatar">U</div>
          <div class="profile-dropdown">
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="courses.html">My Courses</a>
            <hr>
            <a href="#" id="logoutBtn">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="lesson-page">

    <aside class="lesson-sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <h2>Loading...</h2>
        <p>Please wait</p>
      </div>

      <div class="lesson-list" id="lessonList">
      </div>
    </aside>

    <main class="lesson-main">
      <nav class="lesson-breadcrumb">
        <a href="courses.html">Courses</a>
        <span>/</span>
        <span class="current" id="breadcrumbTitle">Loading...</span>
      </nav>

      <article class="lesson-content" id="lessonContent">
        <h1>Loading lesson...</h1>
      </article>
    </main>

    <aside class="ai-panel">
      <div class="ai-panel-header">
        <h3>AI Assistant</h3>
      </div>
      <div class="ai-chat"></div>
      <div class="ai-input-area">
        <textarea class="ai-input"></textarea>
        <button class="ai-send-btn">Send</button>
      </div>
    </aside>

  </div>

  <!-- script.js handles auth, AI panel, navigation, and lesson rendering -->
  <script src="js/script.js"></script>

</body>
</html>
