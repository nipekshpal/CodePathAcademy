<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Login to CodePath - AI-powered coding learning platform.">
  <title>Login - CodePath</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">CodePath</a>
      <div class="nav-links">
        <a href="courses.html" class="nav-link">Courses</a>
        <a href="index.html#about" class="nav-link">About Us</a>
        <a href="index.html#contact" class="nav-link">Contact</a>
      </div>
      <div class="nav-right">
        <button class="theme-toggle" aria-label="Toggle theme"></button>
        <div class="mobile-menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>
  <div class="mobile-nav">
    <a href="courses.html" class="mobile-nav-link">Courses</a>
    <a href="index.html#about" class="mobile-nav-link">About Us</a>
    <a href="index.html#contact" class="mobile-nav-link">Contact</a>
  </div>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue your coding journey</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
      </form>
      <div class="auth-divider">or</div>
      <button type="button" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
